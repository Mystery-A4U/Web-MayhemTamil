<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime4u Networks</title>
<style>
/* ======================================================================
   ANIME4U NETWORKS — obsidian / purple chakra theme
   ====================================================================== */
:root{
  --obsidian-0:#05040a;
  --obsidian-1:#0b0812;
  --obsidian-2:#120c1e;
  --violet:#8b3bff;
  --violet-bright:#b06bff;
  --violet-dim:#4a1f8f;
  --ember:#ff5a3c;
  --water:#2f7fff;
  --text-hi:#f2ecff;
  --text-lo:#a89bc4;
  --font-display: 'Cinzel', 'Iowan Old Style', 'Palatino Linotype', serif;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  height:100%;
  background:var(--obsidian-0);
  color:var(--text-hi);
  font-family:var(--font-body);
  overflow-x:hidden;
}

/* Cursor-reactive obsidian glow field */
#glowfield{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  background:
    radial-gradient(600px circle at var(--mx,50%) var(--my,50%),
      rgba(139,59,255,0.22), rgba(139,59,255,0.06) 35%, transparent 60%),
    radial-gradient(1200px circle at 20% 110%, rgba(74,31,143,0.18), transparent 60%),
    linear-gradient(180deg, var(--obsidian-0), var(--obsidian-1) 40%, var(--obsidian-0));
  transition:background 60ms linear;
}

#glowfield::after{
  content:"";
  position:absolute;
  inset:0;
  background-image:
    radial-gradient(rgba(255,255,255,0.035) 1px, transparent 1px);
  background-size:3px 3px;
  opacity:.5;
  mix-blend-mode:overlay;
}

/* ======================================================================
   INTRO SEQUENCE — water from top-left, lava from bottom-right
   ====================================================================== */
#intro{
  position:fixed;
  inset:0;
  z-index:9999;
  background:var(--obsidian-0);
  overflow:hidden;
}

#intro .surge{
  position:absolute;
  width:150vmax;
  height:150vmax;
  border-radius:38%;
}

#surge-water{
  top:-120vmax;
  left:-120vmax;
  background:
    radial-gradient(circle at 70% 70%, #bfe4ff, #4ea8ff 35%, #1354c4 65%, #062a66 100%);
  filter:blur(2px);
  box-shadow:0 0 120px 40px rgba(78,168,255,0.55);
  animation:surge-water-move 1.9s cubic-bezier(.61,.04,.32,1) forwards;
}

#surge-lava{
  bottom:-120vmax;
  right:-120vmax;
  background:
    radial-gradient(circle at 30% 30%, #ffe8a3, #ff8a3d 30%, #c73a1f 60%, #430b02 100%);
  filter:blur(2px);
  box-shadow:0 0 140px 50px rgba(255,90,60,0.6);
  animation:surge-lava-move 1.9s cubic-bezier(.61,.04,.32,1) forwards;
}

@keyframes surge-water-move{
  0%{ transform:translate(0,0) scale(.6); }
  70%{ transform:translate(78vmax,78vmax) scale(1); }
  100%{ transform:translate(84vmax,84vmax) scale(1.05); }
}
@keyframes surge-lava-move{
  0%{ transform:translate(0,0) scale(.6); }
  70%{ transform:translate(-78vmax,-78vmax) scale(1); }
  100%{ transform:translate(-84vmax,-84vmax) scale(1.05); }
}

#intro-impact{
  position:absolute;
  top:50%;
  left:50%;
  width:0;
  height:0;
  border-radius:50%;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle, #fff, var(--violet-bright) 30%, transparent 70%);
  opacity:0;
  animation:impact-flash 0.9s ease-out 1.55s forwards;
}
@keyframes impact-flash{
  0%{ width:0; height:0; opacity:0; }
  35%{ width:140vmax; height:140vmax; opacity:.95; }
  100%{ width:170vmax; height:170vmax; opacity:0; }
}

#intro-black{
  position:absolute;
  inset:0;
  background:var(--obsidian-0);
  opacity:0;
  animation:to-black 0.8s ease-in 2.05s forwards;
}
@keyframes to-black{ to{ opacity:1; } }

#intro-word{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:var(--font-display);
  letter-spacing:.35em;
  font-size:clamp(1.4rem,4vw,2.6rem);
  color:var(--text-hi);
  text-shadow:0 0 30px var(--violet-bright);
  opacity:0;
  animation:word-reveal 1.4s ease 2.4s forwards;
  text-align:center;
  padding:0 1rem;
}
@keyframes word-reveal{
  0%{ opacity:0; letter-spacing:.8em; }
  60%{ opacity:1; }
  100%{ opacity:0; letter-spacing:.35em; }
}

#intro.done{ display:none; }

/* ======================================================================
   APP SHELL
   ====================================================================== */
#app{
  position:relative;
  z-index:1;
  min-height:100vh;
  opacity:0;
  visibility:hidden;
  transition:opacity 1.1s ease;
}
#app.show{ opacity:1; visibility:visible; }

header.site-head{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:.6rem;
  padding:4.5rem 1.5rem 2.5rem;
  text-align:center;
}

.brand-eyebrow{
  font-size:.7rem;
  letter-spacing:.5em;
  color:var(--text-lo);
  text-transform:uppercase;
}

h1.brand{
  font-family:var(--font-display);
  font-size:clamp(2.2rem,6vw,4rem);
  letter-spacing:.12em;
  background:linear-gradient(180deg, #fff, var(--violet-bright) 70%, var(--violet-dim));
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  text-shadow:0 0 60px rgba(139,59,255,.35);
}

.brand-sub{
  color:var(--text-lo);
  font-size:.95rem;
  max-width:32rem;
  line-height:1.5;
}

/* ======================================================================
   CAROUSEL — vertical 16:9 portal capsules
   ====================================================================== */
#carousel-wrap{
  position:relative;
  padding:2rem 0 4rem;
}

#carousel-track{
  display:flex;
  align-items:center;
  gap:2.2rem;
  padding:6vh 12vw;
  overflow-x:auto;
  scroll-behavior:smooth;
  cursor:grab;
  -ms-overflow-style:none;
  scrollbar-width:none;
  user-select:none;
}
#carousel-track::-webkit-scrollbar{ display:none; }
#carousel-track.dragging{ cursor:grabbing; scroll-behavior:auto; }

.portal{
  position:relative;
  flex:0 0 auto;
  width:min(30vw, 220px);
  aspect-ratio:9/16;
  border-radius:46% / 24%;
  overflow:hidden;
  background:var(--obsidian-2);
  border:1px solid rgba(176,107,255,0.25);
  box-shadow:
    0 0 0 1px rgba(139,59,255,0.08) inset,
    0 20px 40px rgba(0,0,0,.55);
  transform:scale(.78);
  filter:brightness(.55) saturate(.7);
  transition:transform .45s cubic-bezier(.2,.8,.2,1), filter .45s ease, box-shadow .45s ease;
  will-change:transform;
}

.portal.active{
  transform:scale(1.12);
  filter:brightness(1) saturate(1.05);
  box-shadow:
    0 0 0 1px rgba(176,107,255,0.5) inset,
    0 0 55px 6px rgba(139,59,255,0.55),
    0 30px 60px rgba(0,0,0,.6);
  border-color:var(--violet-bright);
}

.portal img{
  width:100%;
  height:100%;
  object-fit:cover;
  pointer-events:none;
  display:block;
}

.portal .portal-veil{
  position:absolute;
  inset:0;
  background:linear-gradient(180deg, transparent 55%, rgba(5,4,10,.92) 100%);
  pointer-events:none;
}

.portal .portal-name{
  position:absolute;
  left:0; right:0; bottom:0;
  padding:1rem .8rem;
  text-align:center;
  font-size:.85rem;
  letter-spacing:.08em;
  color:var(--text-hi);
  text-shadow:0 2px 8px rgba(0,0,0,.8);
  pointer-events:none;
}

.portal-btn{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:0;
  background:transparent;
  cursor:pointer;
  padding:0;
}

.portal-ring{
  position:absolute;
  inset:-3px;
  border-radius:inherit;
  pointer-events:none;
  opacity:0;
  transition:opacity .4s ease;
  background:conic-gradient(from 0deg, var(--violet-bright), transparent 30%, var(--violet-bright) 60%, transparent 90%);
  -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 3px));
  mask:radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 3px));
  animation:ring-spin 6s linear infinite;
}
.portal.active .portal-ring{ opacity:1; }
@keyframes ring-spin{ to{ transform:rotate(360deg); } }

.carousel-nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  z-index:3;
  width:42px;
  height:42px;
  border-radius:50%;
  border:1px solid rgba(176,107,255,.4);
  background:rgba(18,12,30,.7);
  color:var(--text-hi);
  font-size:1.1rem;
  cursor:pointer;
  backdrop-filter:blur(6px);
  transition:background .2s ease, box-shadow .2s ease;
}
.carousel-nav:hover{ background:rgba(139,59,255,.3); box-shadow:0 0 20px rgba(139,59,255,.5); }
.carousel-nav.prev{ left:1rem; }
.carousel-nav.next{ right:1rem; }

.hint{
  text-align:center;
  color:var(--text-lo);
  font-size:.75rem;
  letter-spacing:.2em;
  text-transform:uppercase;
  margin-top:.5rem;
}

/* ======================================================================
   SHARINGAN LOADER
   ====================================================================== */
#sharingan-loader{
  position:fixed;
  inset:0;
  z-index:99999;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(3,2,7,0.0);
  overflow:hidden;
}
#sharingan-loader.active{
  display:flex;
  animation:loader-bg-in .35s ease forwards;
}
@keyframes loader-bg-in{ to{ background:rgba(3,2,7,0.96); } }

.mud-blob{
  position:absolute;
  border-radius:44% 56% 62% 38% / 40% 45% 55% 60%;
  background:radial-gradient(circle at 35% 35%, var(--violet-bright), var(--violet-dim) 60%, transparent 75%);
  filter:blur(18px);
  opacity:.55;
  mix-blend-mode:screen;
  animation:mud-morph 4.5s ease-in-out infinite;
}
.mud-blob.b1{ width:38vmax; height:38vmax; top:20%; left:15%; animation-duration:5.5s; }
.mud-blob.b2{ width:30vmax; height:30vmax; bottom:15%; right:18%; animation-duration:4.2s; animation-delay:.5s; }
.mud-blob.b3{ width:44vmax; height:44vmax; top:35%; right:30%; animation-duration:6.5s; animation-delay:1s; }
@keyframes mud-morph{
  0%,100%{ border-radius:44% 56% 62% 38% / 40% 45% 55% 60%; transform:scale(1) rotate(0deg); }
  50%{ border-radius:60% 40% 35% 65% / 55% 60% 40% 45%; transform:scale(1.15) rotate(25deg); }
}

.sharingan{
  position:relative;
  width:min(38vw, 210px);
  aspect-ratio:1/1;
  border-radius:50%;
  z-index:2;
  animation:sharingan-spin-in 1.6s cubic-bezier(.2,.9,.25,1) forwards;
}
@keyframes sharingan-spin-in{
  0%{ transform:scale(.2) rotate(0deg); opacity:0; }
  55%{ opacity:1; }
  100%{ transform:scale(1) rotate(900deg); opacity:1; }
}

.sharingan .iris{
  position:absolute;
  inset:0;
  border-radius:50%;
  background:radial-gradient(circle at 50% 50%, #ff2d2d 0%, #b50f0f 55%, #4a0303 100%);
  box-shadow:0 0 45px 10px rgba(255,30,30,.55), 0 0 90px 25px rgba(139,59,255,.35);
}
.sharingan .pupil{
  position:absolute;
  top:50%; left:50%;
  width:22%; height:22%;
  border-radius:50%;
  background:#0a0a0a;
  transform:translate(-50%,-50%);
  box-shadow:0 0 12px 4px rgba(0,0,0,.8) inset;
}
.tomoe{
  position:absolute;
  top:50%; left:50%;
  width:100%; height:100%;
  transform:translate(-50%,-50%);
  animation:tomoe-spin 2.4s linear infinite;
}
@keyframes tomoe-spin{ to{ transform:translate(-50%,-50%) rotate(360deg); } }
.tomoe span{
  position:absolute;
  width:20%;
  height:20%;
  background:#0a0a0a;
  border-radius:70% 30% 55% 45% / 60% 55% 45% 40%;
  top:14%;
  left:50%;
  transform-origin:50% 260%;
}
.tomoe span::after{
  content:"";
  position:absolute;
  width:60%;
  height:60%;
  background:#0a0a0a;
  border-radius:50%;
  top:-38%;
  left:20%;
}
.tomoe span:nth-child(1){ transform:translateX(-50%) rotate(0deg) translateY(0); }
.tomoe span:nth-child(2){ transform:translateX(-50%) rotate(120deg) translateY(0); }
.tomoe span:nth-child(3){ transform:translateX(-50%) rotate(240deg) translateY(0); }

.loader-caption{
  position:absolute;
  bottom:14%;
  left:0; right:0;
  text-align:center;
  color:var(--text-lo);
  letter-spacing:.4em;
  font-size:.75rem;
  text-transform:uppercase;
  z-index:2;
  animation:caption-pulse 1.4s ease-in-out infinite;
}
@keyframes caption-pulse{ 0%,100%{opacity:.4;} 50%{opacity:1;} }

/* ======================================================================
   SOCIALS CARD — from Uiverse.io by vinodjangid07 (restyled to theme)
   ====================================================================== */
.socials-dock{
  display:flex;
  justify-content:center;
  padding:2rem 1rem 5rem;
}

.card {
  position: relative;
  width: 190px;
  height: 254px;
  background: var(--obsidian-1);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 8px;
  box-shadow: 0 0 0 1px rgba(176,107,255,.25), 0 20px 45px rgba(0,0,0,.55);
  border-radius: 15px;
  overflow: hidden;
}

.card .background {
  position: absolute;
  inset: 0;
  background: radial-gradient(120% 120% at 50% 0%, rgba(139,59,255,.35), transparent 60%);
}

.logo {
  position: absolute;
  top: 18px;
  left: 22px;
  font-family: var(--font-display);
  letter-spacing: .12em;
  font-size: .78rem;
  color: var(--text-lo);
  text-transform: uppercase;
  z-index: 3;
}

.card .box {
  position: absolute;
  background: rgba(18,12,30,.85);
  border: 1px solid rgba(176,107,255,.3);
  border-radius: 50%;
  width: 56px;
  height: 56px;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index: 2;
  transition: transform .35s ease, box-shadow .35s ease, background .35s ease;
}
.card .box:hover{
  transform: translateY(-4px) scale(1.08);
  background: rgba(139,59,255,.35);
  box-shadow: 0 0 25px rgba(139,59,255,.6);
}
.card .box .icon .svg{ width: 24px; height: 24px; fill: var(--text-hi); }

.box1 { top: 96px; left: 24px; }
.box2 { top: 96px; right: 24px; }
.box3 { bottom: 30px; left: 50%; transform: translateX(-50%); }
.box4 { display:none; }

/* ======================================================================
   FOOTER
   ====================================================================== */
footer{
  text-align:center;
  color:var(--text-lo);
  font-size:.75rem;
  letter-spacing:.15em;
  padding:2rem 1rem 3rem;
  text-transform:uppercase;
  opacity:.6;
}

@media (max-width:640px){
  .portal{ width:52vw; }
  #carousel-track{ padding:6vh 8vw; gap:1.2rem; }
}
</style>
</head>

  </div>

  <footer>Anime4u Networks &mdash; walk through the portal you seek</footer>
</div>

<script>
/* ============================================================================
   ██████╗  ██████╗     ███╗   ██╗ ██████╗ ████████╗    ███████╗██████╗ ██╗████████╗
   ██╔══██╗██╔═══██╗    ████╗  ██║██╔═══██╗╚══██╔══╝    ██╔════╝██╔══██╗██║╚══██╔══╝
   ██║  ██║██║   ██║    ██╔██╗ ██║██║   ██║   ██║       █████╗  ██║  ██║██║   ██║
   ██║  ██║██║   ██║    ██║╚██╗██║██║   ██║   ██║       ██╔══╝  ██║  ██║██║   ██║
   ██████╔╝╚██████╔╝    ██║ ╚████║╚██████╔╝   ██║       ███████╗██████╔╝██║   ██║
   ╚═════╝  ╚═════╝     ╚═╝  ╚═══╝ ╚═════╝    ╚═╝       ╚══════╝╚═════╝ ╚═╝   ╚═╝

   ============================================================================
   ADMIN PANEL — EDIT-IN-CODE ONLY
   ============================================================================
   This is the only "admin panel" for the site. There is no login page and no
   UI route because none is exposed — you edit the two config objects below,
   save the file, and commit/push to GitHub (or your host of choice).

   HOW TO ADD / EDIT / REMOVE A CHANNEL
   -------------------------------------
   Add, edit, or delete objects inside the CHANNELS array below.

     {
       name:  "Channel display name",   // shown under the poster
       poster: "https://your-image-url.jpg", // vertical image works best (9:16)
       link:  "https://destination-url.com"  // where the user is sent on click
     }

   The carousel is rebuilt automatically from this array on page load —
   you never need to touch the HTML or the rendering code below it.

   HOW TO EDIT SOCIAL LINKS
   -------------------------------------
   Edit the SOCIAL_LINKS object further down (instagram / twitter / discord).
   ============================================================================ */

const CHANNELS = [
  {
    name:  "Channel One",
    poster: "https://placehold.co/540x960/120c1e/8b3bff?text=Channel+One",
    link:  "https://example.com/channel-one"
  },
  {
    name:  "Channel Two",
    poster: "https://placehold.co/540x960/120c1e/8b3bff?text=Channel+Two",
    link:  "https://example.com/channel-two"
  },
  {
    name:  "Channel Three",
    poster: "https://placehold.co/540x960/120c1e/8b3bff?text=Channel+Three",
    link:  "https://example.com/channel-three"
  },
  {
    name:  "Channel Four",
    poster: "https://placehold.co/540x960/120c1e/8b3bff?text=Channel+Four",
    link:  "https://example.com/channel-four"
  },
  {
    name:  "Channel Five",
    poster: "https://placehold.co/540x960/120c1e/8b3bff?text=Channel+Five",
    link:  "https://example.com/channel-five"
  }
];

const SOCIAL_LINKS = {
  instagram: "https://www.instagram.com/anime4u_networks?igsh=ZmllbDJ3MDF1dGR5",
  twitter:   "https://x.com/your-handle",
  discord:   "https://discord.gg/your-invite"
};

/* ============================================================================
   END OF ADMIN CONFIG — nothing below this line needs manual editing
   ============================================================================ */

document.getElementById('social-instagram').href = SOCIAL_LINKS.instagram;
document.getElementById('social-twitter').href   = SOCIAL_LINKS.twitter;
document.getElementById('social-discord').href   = SOCIAL_LINKS.discord;

/* ---------------- Cursor-reactive obsidian glow ---------------- */
const glowfield = document.getElementById('glowfield');
window.addEventListener('pointermove', (e) => {
  const xPct = (e.clientX / window.innerWidth) * 100;
  const yPct = (e.clientY / window.innerHeight) * 100;
  glowfield.style.setProperty('--mx', xPct + '%');
  glowfield.style.setProperty('--my', yPct + '%');
});

/* ---------------- Intro sequence ---------------- */
const intro = document.getElementById('intro');
const app = document.getElementById('app');

function endIntro(){
  intro.classList.add('done');
  app.classList.add('show');
}
// total intro runtime ~3.7s, then reveal app
setTimeout(endIntro, 3700);
// allow skipping the intro with a click/tap
intro.addEventListener('click', endIntro);

/* ---------------- Build carousel from CHANNELS ---------------- */
const track = document.getElementById('carousel-track');

CHANNELS.forEach((ch, i) => {
  const portal = document.createElement('div');
  portal.className = 'portal';
  portal.dataset.index = i;

  portal.innerHTML = `
    <img src="${ch.poster}" alt="${ch.name}" draggable="false">
    <div class="portal-ring"></div>
    <div class="portal-veil"></div>
    <div class="portal-name">${ch.name}</div>
    <button class="portal-btn" aria-label="Open ${ch.name}"></button>
  `;

  portal.querySelector('.portal-btn').addEventListener('click', (e) => {
    if (track.dataset.wasDragging === '1') return; // ignore click after a drag
    openPortal(ch.link);
  });

  track.appendChild(portal);
});

const portals = Array.from(document.querySelectorAll('.portal'));

/* ---------------- Active / scale-on-proximity logic ---------------- */
function updateActivePortal(){
  const trackRect = track.getBoundingClientRect();
  const centerX = trackRect.left + trackRect.width / 2;

  let closest = null;
  let closestDist = Infinity;

  portals.forEach(p => {
    const r = p.getBoundingClientRect();
    const pCenter = r.left + r.width / 2;
    const dist = Math.abs(pCenter - centerX);
    if (dist < closestDist){ closestDist = dist; closest = p; }

    // proximity-based scale for a smooth "coming closer" feel
    const maxDist = trackRect.width / 2;
    const proximity = Math.max(0, 1 - dist / maxDist);
    const scale = 0.78 + proximity * 0.42;
    p.style.transform = `scale(${scale.toFixed(3)})`;
    p.style.filter = `brightness(${(0.55 + proximity * 0.5).toFixed(2)}) saturate(${(0.7 + proximity * 0.4).toFixed(2)})`;
  });

  portals.forEach(p => p.classList.toggle('active', p === closest));
}

let rafPending = false;
function scheduleUpdate(){
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(() => { updateActivePortal(); rafPending = false; });
}

track.addEventListener('scroll', scheduleUpdate);
window.addEventListener('resize', scheduleUpdate);

/* ---------------- Drag to slide (mouse + touch via Pointer Events) ---------------- */
let isDown = false;
let startX = 0;
let scrollLeftStart = 0;
let dragMoved = 0;

track.addEventListener('pointerdown', (e) => {
  isDown = true;
  dragMoved = 0;
  track.dataset.wasDragging = '0';
  track.classList.add('dragging');
  startX = e.clientX;
  scrollLeftStart = track.scrollLeft;
  track.setPointerCapture(e.pointerId);
});

track.addEventListener('pointermove', (e) => {
  if (!isDown) return;
  const dx = e.clientX - startX;
  dragMoved += Math.abs(dx);
  track.scrollLeft = scrollLeftStart - dx;
  scheduleUpdate();
  if (dragMoved > 6) track.dataset.wasDragging = '1';
});

function endDrag(){
  isDown = false;
  track.classList.remove('dragging');
  // snap to nearest portal center
  snapToNearest();
  setTimeout(() => { track.dataset.wasDragging = '0'; }, 50);
}
track.addEventListener('pointerup', endDrag);
track.addEventListener('pointerleave', () => { if (isDown) endDrag(); });

function snapToNearest(){
  const trackRect = track.getBoundingClientRect();
  const centerX = trackRect.left + trackRect.width / 2;
  let closest = null;
  let closestDist = Infinity;
  portals.forEach(p => {
    const r = p.getBoundingClientRect();
    const pCenter = r.left + r.width / 2;
    const dist = Math.abs(pCenter - centerX);
    if (dist < closestDist){ closestDist = dist; closest = p; }
  });
  if (closest) closest.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
}

/* ---------------- Prev / next arrows ---------------- */
document.querySelector('.carousel-nav.prev').addEventListener('click', () => {
  track.scrollBy({ left: -260, behavior: 'smooth' });
});
document.querySelector('.carousel-nav.next').addEventListener('click', () => {
  track.scrollBy({ left: 260, behavior: 'smooth' });
});

/* initial layout pass + snap first card to center */
window.addEventListener('load', () => {
  scheduleUpdate();
  if (portals[0]) portals[0].scrollIntoView({ inline: 'center', block: 'nearest' });
  setTimeout(scheduleUpdate, 60);
});

/* ---------------- Sharingan loader + redirect ---------------- */
const loader = document.getElementById('sharingan-loader');

function openPortal(url){
  loader.classList.add('active');
  // reset animation so it replays on repeated clicks
  const eye = loader.querySelector('.sharingan');
  eye.style.animation = 'none';
  void eye.offsetWidth;
  eye.style.animation = '';

  setTimeout(() => {
    window.location.href = url;
  }, 1800);
}
</script>
